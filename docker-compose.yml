services:
  postgres:
    image: postgres:16-alpine
    container_name: ctd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ctd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ctd_password}
      POSTGRES_DB: ${POSTGRES_DB:-ctd}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ctd} -d ${POSTGRES_DB:-ctd}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ctd-api
    restart: unless-stopped
    env_file: .env
    environment:
      INVOICE_UPLOAD_DIR: /app/uploads/invoices
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/db:/app/packages/db
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ctd-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    depends_on:
      - api

volumes:
  postgres_data:
  uploads:
